################################################################################
# woodstack01.yaml
# ESP32-S3 — Node 1: 5/4 and 6/4 Stock
# Black Walnut Air-Drying Stack Monitor
#
# Hardware:
#   - ESP32-S3 DevKit
#   - 2x CD74HC4067 16-channel analog multiplexer breakout
#     MUX A: channels 0-15  (5_4 stock — upper shelves)
#     MUX B: channels 16-31 (6_4 stock — lower shelves)
#
# Wiring:
#   GPIO1  → ADC input (voltage divider midpoint)
#   GPIO9  → Excitation output
#   GPIO4  → MUX S0 (shared between both MUX boards)
#   GPIO5  → MUX S1 (shared between both MUX boards)
#   GPIO6  → MUX S2 (shared between both MUX boards)
#   GPIO7  → MUX S3 (shared between both MUX boards)
#   GPIO8  → MUX A INH (active LOW — drive LOW to enable MUX A)
#   3.3V   → Both MUX VCC
#   GND    → Both MUX VEE, GND, and all second probe pins
#
# Stack layout:
#   Shelving: 3x Husky 77"W x 72"H x 24"D, spaced 18" apart
#   Total board run: ~9 feet
#   6/4 stock: bottom 2 shelves of each unit
#   5/4 stock: top 2 shelves of each unit
#
# Probe placement:
#   All probes at board center width
#   Probe pair A: 1_3 board length from one end
#   Probe pair B: 2_3 board length from one end
#   Shallow probe: 1_4 depth from surface
#   Deep probe:    1_2 depth from surface
################################################################################

esphome:
  name: woodstack01-mer
  friendly_name: "Stack Moisture Node 1 - 5-4 and 6-4"
  on_boot:
    priority: 600
    then:
      - output.turn_off: excite_pin
      - output.turn_off: mux_en    # LOW = MUX ensabled (inverted)
      - logger.log: "Boot complete - excite LOW, MUX enabled"

substitutions:
  cal_a: "31.62"          # Black walnut log-linear curve coefficient A
  cal_b: "2.985"          # Black walnut log-linear curve coefficient B
  ref_resistor: "100000.0"
  vcc: "3.3"
  temp_baseline_c: "21.1"
  scan_interval: "30s"
  node_name: "node1"
  bleed_delay: "50"
  addr_delay: "10"
  read_delay: "200"
  r1_value: "10000.0"
  r2_value: "100000.0"
  r_dry_clamp: "1500000.0"
  r_wet_clamp: "8000.0"
  
esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: arduino

logger:
  level: DEBUG

api:
  encryption:
    key: !secret api_encryption_key
ota:
  - platform: esphome
    password: ""

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true
  manual_ip:
    static_ip: 192.168.72.24
    gateway: 192.168.72.1
    subnet: 255.255.254.0
    dns1: 172.16.1.60
    dns2: 172.16.1.61

# Example configuration entry
#statsd:
#  host: 172.16.1.108
#  port: 8125
#  prefix: "woodstack.esp32.woodstack01-mer"
#  update_interval: 15s
#  sensors:
#    - name: sensor.wifi.wifi-signal-db
#      id: wifi_signal_db
#    - name: sensor.wifi.wifi-signal-percent
#      id: wifi_signal_percent

# ── Outputs ───────────────────────────────────────────────────────────────────
output:
  - platform: gpio
    id: mux_s0
    pin: GPIO4

  - platform: gpio
    id: mux_s1
    pin: GPIO5

  - platform: gpio
    id: mux_s2
    pin: GPIO6

  - platform: gpio
    id: mux_s3
    pin: GPIO7

  # MUX A INH — inverted: turn_off drives LOW → MUX A enabled
  - platform: gpio
    id: mux_en
    pin: GPIO8

  - platform: gpio
    id: excite_pin
    pin: GPIO9

# ── Shared lambda include ─────────────────────────────────────────────────────
# The resistance→MC% conversion is identical across all channels.
# Each channel lambda selects the correct MUX (A or B), sets S0-S3,
# takes the AC-excitation reading pair, then converts.
sensor:
  # Example configuration entry with 2 sensors and filter
#  - platform: wifi_signal # Reports the WiFi signal strength/RSSI in dB
#    name: "WiFi Signal dB"
#    id: wifi_signal_db
#    update_interval: 15s
#    entity_category: "diagnostic"

#  - platform: copy # Reports the WiFi signal strength in %
#    source_id: wifi_signal_db
#    id: wifi_signal_percent
#    name: "WiFi Signal Percent"
#    filters:
#      - lambda: return min(max(2 * (x + 100.0), 0.0), 100.0);
#    unit_of_measurement: "Signal %"
#    entity_category: "diagnostic"
#    device_class: ""

  - platform: adc
    pin: GPIO1
    id: raw_adc
    name: "Raw ADC Node1"
    internal: true
    attenuation: auto
    update_interval: 50ms
    samples: 1
    sampling_mode: avg
    filters:
      -

  - platform: homeassistant
    id: stack_temp_c
    entity_id: sensor.sensor07_mer_temperature
    internal: true

  # ════════════════════════════════════════════════════════════════════════════
  # MUX A — 5/4 STOCK (upper shelves, channels 0-15)
  # Channel naming: [shelf unit 1-3][shelf level T=top/U=upper][1/3 or 2/3 pos][S=shallow/D=deep]
  # ════════════════════════════════════════════════════════════════════════════

  # ── Unit 1, Top Shelf, 5/4 ──────────────────────────────────────────────
  - platform: template
    name: "2in Calibbration Shallow"
    id: m_a00
    unit_of_measurement: "%"
    accuracy_decimals: 1
    icon: "mdi:water-percent"
    update_interval: ${scan_interval}
    lambda: |-
      id(mux_en).turn_on();    // disable MUX briefly (inverted: HIGH = disabled)
      delay(${bleed_delay});
      id(mux_en).turn_off();   // ensure MUX stays enabled
      id(mux_s0).turn_off(); id(mux_s1).turn_off(); id(mux_s2).turn_off(); id(mux_s3).turn_off();
      delay(${addr_delay});
      id(excite_pin).turn_off();
      delay(${read_delay});
      float vbase = id(raw_adc).sample();
      id(excite_pin).turn_on();
      delay(${read_delay});
      float vh = id(raw_adc).sample();
      id(excite_pin).turn_off();
      delay(${read_delay});
      float vl = id(raw_adc).sample();
      float v = vh;
      ESP_LOGD("voltage", "CH-A00 vbase=%.4f vh=%.4f vl=%.4f v=%.4f", vbase, vh, vl, v);
      if (v >= 3.26f || v <= 0.05f) {
        ESP_LOGW("moisture", "CH-A00 open/short circuit - v=%.4f", v);
        return NAN;
      }
      float r = (${r2_value} * 3.3f / v) - ${r1_value} - ${r2_value};
      ESP_LOGD("moisture", "CH-A00 r=%.0f", r);
      if (r <= 0.0f) return 28.0f;          // effectively short
      if (r > 1500000.0f) return 6.0f;      // below measurement range
      if (r < 8000.0f) return 28.0f;        // above fiber saturation
      float mc = ${cal_a} - ${cal_b} * log10f(r);
      float t = id(stack_temp_c).state;
      ESP_LOGD("moisture", "CH-A00 temp=%.1f", t);
      if (!isnan(t)) {
        mc -= ((t - 21.1f) / 5.6f) * 0.5f;
      } else {
        ESP_LOGW("moisture", "CH-A00 temp unavailable, skipping correction");
      }
      return mc;

  - platform: template
    name: "2in Calibbration Deep"
    id: m_a01
    unit_of_measurement: "%"
    accuracy_decimals: 1
    icon: "mdi:water-percent"
    update_interval: ${scan_interval}
    lambda: |-
      id(mux_en).turn_on();    // disable MUX briefly (inverted: HIGH = disabled)
      delay(${bleed_delay});
      id(mux_en).turn_off();   // ensure MUX stays enabled
      id(mux_s0).turn_on(); id(mux_s1).turn_off(); id(mux_s2).turn_off(); id(mux_s3).turn_off();
      delay(${addr_delay});
      id(excite_pin).turn_off();
      delay(${read_delay});
      float vbase = id(raw_adc).sample();
      id(excite_pin).turn_on();
      delay(${read_delay});
      float vh = id(raw_adc).sample();
      id(excite_pin).turn_off();
      delay(${read_delay});
      float vl = id(raw_adc).sample();
      float v = vh;
      ESP_LOGD("voltage", "CH-A01 vbase=%.4f vh=%.4f vl=%.4f v=%.4f", vbase, vh, vl, v);
      if (v >= 3.26f || v <= 0.05f) {
        ESP_LOGW("moisture", "CH-A01 open/short circuit - v=%.4f", v);
        return NAN;
      }
      float r = (${r2_value} * 3.3f / v) - ${r1_value} - ${r2_value};
      ESP_LOGD("moisture", "CH-A00 r=%.0f", r);
      if (r <= 0.0f) return 28.0f;          // effectively short
      if (r > 1500000.0f) return 6.0f;      // below measurement range
      if (r < 8000.0f) return 28.0f;        // above fiber saturation
      float mc = ${cal_a} - ${cal_b} * log10f(r);
      float t = id(stack_temp_c).state;
      ESP_LOGD("moisture", "CH-A01 temp=%.1f", t);
      if (!isnan(t)) {
        mc -= ((t - 21.1f) / 5.6f) * 0.5f;
      } else {
        ESP_LOGW("moisture", "CH-A01 temp unavailable, skipping correction");
      }
      return mc;

  - platform: template
    name: "2019 Reference"
    id: m_a02
    unit_of_measurement: "%"
    accuracy_decimals: 1
    icon: "mdi:water-percent"
    update_interval: ${scan_interval}
    lambda: |-
      id(mux_en).turn_on();    // disable MUX briefly (inverted: HIGH = disabled)
      delay(${bleed_delay});
      id(mux_en).turn_off();   // ensure MUX stays enabled
      id(mux_s0).turn_off(); id(mux_s1).turn_on(); id(mux_s2).turn_off(); id(mux_s3).turn_off();
      delay(${addr_delay});
      id(excite_pin).turn_off();
      delay(${read_delay});
      float vbase = id(raw_adc).sample();
      id(excite_pin).turn_on();
      delay(${read_delay});
      float vh = id(raw_adc).sample();
      id(excite_pin).turn_off();
      delay(${read_delay});
      float vl = id(raw_adc).sample();
      float v = vh;
      ESP_LOGD("voltage", "CH-A02 vbase=%.4f vh=%.4f vl=%.4f v=%.4f", vbase, vh, vl, v);
      if (v >= 3.26f || v <= 0.05f) {
        ESP_LOGW("moisture", "CH-A02 open/short circuit - v=%.4f", v);
        return NAN;
      }
      float r = (${r2_value} * 3.3f / v) - ${r1_value} - ${r2_value};
      ESP_LOGD("moisture", "CH-A00 r=%.0f", r);
      if (r <= 0.0f) return 28.0f;          // effectively short
      if (r > 1500000.0f) return 6.0f;      // below measurement range
      if (r < 8000.0f) return 28.0f;        // above fiber saturation
      float mc = ${cal_a} - ${cal_b} * log10f(r);
      float t = id(stack_temp_c).state;
      ESP_LOGD("moisture", "CH-A02 temp=%.1f", t);
      if (!isnan(t)) {
        mc -= ((t - 21.1f) / 5.6f) * 0.5f;
      } else {
        ESP_LOGW("moisture", "CH-A02 temp unavailable, skipping correction");
      }
      return mc;
    state_class: measurement

