# StatsD -> Telegraf -> InfluxDB. Metric name after the prefix is
#   wood.<stack>.<level>.<thickness>.<board>.<spot>.<depth>.<field>
# Both mc and resistance are shipped so MC can be re-derived downstream with an
# updated curve without reflashing (see data/README.md).
statsd:
  host: 172.16.1.108
  port: 8125
  prefix: "woodstack.esp32.woodstack01-mer"
  update_interval: 60s
  sensors:
    - name: wood.${stack}.s1.5-4.01.mid.shallow.mc
      id: m00
    - name: wood.${stack}.s1.5-4.01.mid.shallow.resistance
      id: r00
    - name: wood.${stack}.s1.5-4.01.mid.deep.mc
      id: m01
    - name: wood.${stack}.s1.5-4.01.mid.deep.resistance
      id: r01
    - name: wood.${stack}.s1.5-4.02.mid.shallow.mc
      id: m02
    - name: wood.${stack}.s1.5-4.02.mid.shallow.resistance
      id: r02
    - name: wood.${stack}.s1.5-4.02.mid.deep.mc
      id: m03
    - name: wood.${stack}.s1.5-4.02.mid.deep.resistance
      id: r03
    - name: wood.${stack}.s3.6-4.01.mid.shallow.mc
      id: m04
    - name: wood.${stack}.s3.6-4.01.mid.shallow.resistance
      id: r04
    - name: wood.${stack}.s3.6-4.01.mid.deep.mc
      id: m05
    - name: wood.${stack}.s3.6-4.01.mid.deep.resistance
      id: r05
    - name: wood.${stack}.s3.6-4.02.mid.shallow.mc
      id: m06
    - name: wood.${stack}.s3.6-4.02.mid.shallow.resistance
      id: r06
    - name: wood.${stack}.s3.6-4.02.mid.deep.mc
      id: m07
    - name: wood.${stack}.s3.6-4.02.mid.deep.resistance
      id: r07
    - name: wood.${stack}.s4.7-4.01.mid.shallow.mc
      id: m08
    - name: wood.${stack}.s4.7-4.01.mid.shallow.resistance
      id: r08
    - name: wood.${stack}.s4.7-4.01.mid.deep.mc
      id: m09
    - name: wood.${stack}.s4.7-4.01.mid.deep.resistance
      id: r09
    - name: wood.${stack}.s4.7-4.02.mid.shallow.mc
      id: m10
    - name: wood.${stack}.s4.7-4.02.mid.shallow.resistance
      id: r10
    - name: wood.${stack}.s4.7-4.02.mid.deep.mc
      id: m11
    - name: wood.${stack}.s4.7-4.02.mid.deep.resistance
