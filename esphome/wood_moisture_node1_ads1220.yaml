################################################################################
# wood_moisture_node1_ads1220.yaml
# Node 1 — 5/4, 6/4, 7/4 stock.  ADS1220 + one CD74HC4067, 16 channels.
#
# Supersedes wood_moisture_node1.yaml (ESP32-S3 internal ADC + dual mux). The
# probes, the calibration curve and the StatsD schema are unchanged; only the
# sense path moved.
#
# !! Bench-validate the ADC first: see components/ads1220_moisture/BENCH.md !!
#
# Hardware: XIAO ESP32-S3 + ADS1220 breakout + 1x CD74HC4067 (at 5V) + 74AHCT541
# Board:    see the wood-sensor-ads repo, docs/analog-front-end-design.md
#
# THE ONE WIRING CHANGE THAT WILL BITE YOU:
#   the probe return bus is NOT ground any more. All probe- pins land on RET_BUS,
#   which sits at ~2.0 V (I x R_ref), with R_ref between RET_BUS and AGND.
#
# XIAO pin map
#   GPIO7  SCLK      GPIO8  MISO(DOUT)     GPIO9  MOSI(DIN)
#   GPIO1  CS        GPIO2  DRDY
#   GPIO3-6  MUX S0-S3   (through the 74AHCT541 level shifter)
#   GPIO43   MUX EN      (through the 74AHCT541; active LOW)
################################################################################

esphome:
  name: woodstack01-mer
  friendly_name: "Stack Moisture Node 1 - 5-4, 6-4, 7-4"

substitutions:
  node_name: "node1"
  stack: "shelf1"
  # Black walnut, refit against the oven-dry run (see wood_moisture_calibration_strategy.md).
  # NOT the USDA 31.62/2.985 curve, which over-reads this walnut by several points.
  cal_a: "45.8"
  cal_b: "7.53"
  temp_baseline_c: "21.1"
  # The 0.1% reference resistor. Measure the real one and put its value here -- it is
  # the only calibration anchor, and every reading scales directly with it.
  r_ref: "200000.0"
  scan_interval: "300s"

esp32:
  board: seeed_xiao_esp32s3
  framework:
    type: esp-idf

logger:
  level: INFO         # DEBUG adds a per-reading "CHx gain=.. ratio=.. R=.." line

api:
  encryption:
    key: !secret api_encryption_key
ota:
  - platform: esphome
    password: ""

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true

external_components:
  - source:
      type: git
      url: https://github.com/muel9560/wood_drying
      ref: feature_ads1220_frontend
    components: [ads1220_moisture]

spi:
  clk_pin: GPIO7
  miso_pin: GPIO8
  mosi_pin: GPIO9

ads1220_moisture:
  id: afe
  cs_pin: GPIO1
  drdy_pin: GPIO2
  r_ref: ${r_ref}
  idac: 10uA
  line_frequency: 60Hz
  mux_pins: [GPIO3, GPIO4, GPIO5, GPIO6]   # S0-S3, via the 74AHCT541
  mux_enable_pin: GPIO43                   # EN, via the 74AHCT541 (active LOW)

sensor:
  # Ambient temperature for the correction. Point this at whichever climate node
  # actually sits in this stack.
  - platform: homeassistant
    id: stack_temp_c
    entity_id: sensor.sensor07_mer_temperature
    internal: true

  - platform: ads1220_moisture
    ads1220_moisture_id: afe
    name: "5-4 b01 mid shallow"
    id: m00
    channel: 0
    cal_a: ${cal_a}
    cal_b: ${cal_b}
    temperature_baseline: ${temp_baseline_c}
    temperature: stack_temp_c
    update_interval: ${scan_interval}
    resistance:
      name: "5-4 b01 mid shallow R"
      id: r00
  - platform: ads1220_moisture
    ads1220_moisture_id: afe
    name: "5-4 b01 mid deep"
    id: m01
    channel: 1
    cal_a: ${cal_a}
    cal_b: ${cal_b}
    temperature_baseline: ${temp_baseline_c}
    temperature: stack_temp_c
    update_interval: ${scan_interval}
    resistance:
      name: "5-4 b01 mid deep R"
      id: r01
  - platform: ads1220_moisture
