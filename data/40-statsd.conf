[[inputs.statsd]]
  protocol = "udp"
  service_address = "172.16.1.108:8125"
  delete_gauges = true
  delete_counters = true
  delete_sets = true
  delete_timings = true
  metric_separator = "_"
  percentiles = [90, 95, 98]
  interval = "15s"
  flush_interval = "15s"

  templates = [
    # ── Wood-moisture probes (11 segments) ──────────────────────────────────
    # woodstack.esp32.<node>.wood.<stack>.<level>.<thickness>.<board>.<spot>.<depth>.<field>
    #   kind  = wood            field = mc | resistance
    #   stack = shelf1|stack1…  level = s1..s4 | high|mid|low
    "woodstack.*.*.wood.*.*.*.*.*.*.* measurement.sensorplatform.sensorid.kind.stack.level.thickness.board.spot.depth.field",

    # ── Climate sensors (7 segments) ────────────────────────────────────────
    # woodstack.esp32.<node>.climate.<stack>.<level>.<field>
    #   kind = climate          field = temperature | humidity
    "woodstack.*.*.climate.*.*.* measurement.sensorplatform.sensorid.kind.stack.level.field",

    # ── Other MER sensor fleet (unchanged) ──────────────────────────────────
    "sensor.*.*.*.*.*.*.*.* measurement.sensorplatform.loc.building.floor.room.sensorid.sensortype.field",
  ]

  # This tag is the "routing label"
  [inputs.statsd.tags]
    routing_target = "statsd_bucket"
