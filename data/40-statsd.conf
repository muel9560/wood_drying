[[inputs.statsd]]
  protocol = "udp"
  service_address = "172.16.1.108:8125"
  delete_gauges = true
  delete_counters = true
  delete_sets = true
  delete_timings = true
  metric_separator = "_"
  percentiles = [90, 95, 98]
  interval = "15s"
  flush_interval = "15s"

  templates = [
	"woodstack.*.*.*.* measurement.sensorplatform.sensorid.class.sensortype.field",
	"sensor.*.*.*.*.*.*.*.* measurement.sensorplatform.loc.building.floor.room.sensorid.sensortype.field",
]

  # This tag is the "routing label"
  [inputs.statsd.tags]
    routing_target = "statsd_bucket"
